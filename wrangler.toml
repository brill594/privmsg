name = "privmsg"
main = "src/worker.js"
compatibility_date = "2026-04-17"

[observability]
enabled = true

[assets]
directory = "./dist"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "privmsg-prod"
database_id = "efb894c9-ebe4-4083-abea-655ed37f22ba"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "privmsg-payloads-prod"
preview_bucket_name = "privmsg-payloads-preview"
